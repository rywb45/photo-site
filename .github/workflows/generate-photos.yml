name: Generate site artifacts

on:
  workflow_dispatch:
    inputs:
      regen_photos_json:
        description: "Also regenerate photos.json from filesystem (destructive; edit mode is the source of truth)"
        type: boolean
        default: false
  push:
    branches: ["main"]
    paths:
      - "photos.json"
      - "index.html"
      - "tools/generate-album-pages.js"
      - ".github/workflows/generate-photos.yml"

permissions:
  contents: write

concurrency:
  group: generate-site-artifacts
  cancel-in-progress: true

jobs:
  gen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate photos.json (manual only)
        if: ${{ inputs.regen_photos_json == true }}
        run: npm run gen

      - name: Generate album preview pages
        run: npm run gen:albums

      - name: Commit changes if any
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update site artifacts (album pages)"

          # Rebase onto latest main (avoids "fetch first" / non-fast-forward)
          git pull --rebase origin main

          git push
