<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="/">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.github.com; frame-ancestors 'none';">
    <title>Ryan Byrne</title>
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <!-- og-tags-start -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Ryan Byrne">
    <meta property="og:title" content="Ryan Byrne">
    <meta property="og:url" content="https://ryanbyrne.me/">
    <meta property="og:image" content="https://ryanbyrne.me/apple-touch-icon.png">
    <meta property="og:image:width" content="180">
    <meta property="og:image:height" content="180">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Ryan Byrne">
    <meta name="twitter:image" content="https://ryanbyrne.me/apple-touch-icon.png">
    <!-- og-tags-end -->
  </head>
  <body>
    <aside class="sidebar">
      <h1><span id="nameText">Ryan Byrne</span><span class="edit-cursor" id="editCursor"></span></h1>
      <nav id="albumNav"></nav>
      <div class="social">
        <a href="https://www.instagram.com/ryyyanbyrne/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <img src="instagram.svg" alt="Instagram" width="22" height="22">
        </a>
      </div>
      <img src="photos/signature.png" class="signature" alt="Signature">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
      <p class="copyright">© <span id="year"></span></p>
    </aside>
    <main class="main">
      <div class="mobile-header">
        <div class="mobile-header-title" id="mobileHeaderTitle"></div>
        <button class="mobile-close" id="mobileClose" aria-label="Close"></button>
      </div>
      <div id="grid"></div>
      <footer class="footer"></footer>
    </main>
    <div id="lightbox" class="lightbox">
      <button id="lbClose" class="lb-btn lb-close" aria-label="Close"></button>
      <button id="lbDownload" class="lb-btn lb-download" aria-label="Download photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button id="lbPrev" class="lb-btn lb-prev" aria-label="Previous"></button>
      <button id="lbNext" class="lb-btn lb-next" aria-label="Next"></button>
      <div class="lb-dots" id="lbDots"></div>
      <div class="lb-track" id="lbTrack"></div>
    </div>
    <script src="script.js"></script>
    <script>
      // Default dark mode + manual toggle
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('inverted');

        const toggle = document.getElementById('themeToggle');
        if (toggle) {
          toggle.addEventListener('click', function() {
            document.body.classList.toggle('inverted');
          });
        }
      });
    </script>
  </body>
</html>
